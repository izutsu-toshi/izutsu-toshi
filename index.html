<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ログカウンター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#333;padding:12px;max-width:600px;margin:0 auto;font-size:16px}
h1{font-size:18px;font-weight:700;margin-bottom:12px;color:#333}
.header-card{background:#f5f5f5;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.header-field label{font-size:12px;color:#999;display:block;margin-bottom:3px}
.header-field input{width:100%;font-size:15px;padding:8px 10px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#333}
.header-field input:focus{outline:none;border-color:#C8773A}

/* 音声バー */
.voice-mic{width:56px;height:56px;border-radius:50%;background:#e74c3c;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;animation:pulse 1s infinite}
.voice-mic.paused{background:#aaa;animation:none}
.voice-bar{display:flex;align-items:center;gap:10px;background:#f0f0f0;border-radius:12px;padding:10px 14px;margin-bottom:12px}
.voice-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;transition:background 0.2s;touch-action:manipulation}
.voice-btn.off{background:#ddd;color:#888}
.voice-btn.on{background:#e74c3c;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}50%{box-shadow:0 0 0 10px rgba(231,76,60,0)}}
.voice-info{flex:1;min-width:0}
.voice-status{font-size:13px;color:#555;font-weight:500}
.voice-result{font-size:12px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.voice-help{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5}

/* 山主タブ */
.owner-section{margin-bottom:12px}
.owner-section-label{font-size:12px;color:#999;margin-bottom:6px}
.owner-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.owner-tab{display:flex;align-items:center;gap:4px;padding:9px 14px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #ccc;border-radius:20px;background:#f5f5f5;color:#888;touch-action:manipulation}
.owner-tab.active{background:#5B7FA6!important;border-color:#5B7FA6!important;color:#fff!important}
.owner-tab-name{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.owner-tab input.inline-edit{font-size:14px;font-weight:500;border:none;background:transparent;color:#fff;outline:none;width:80px;padding:0}
.owner-del{font-size:13px;opacity:0.7;cursor:pointer;flex-shrink:0}
.add-owner-btn{padding:9px 14px;font-size:13px;border:1.5px dashed #ccc;border-radius:20px;background:none;color:#999;cursor:pointer;white-space:nowrap;touch-action:manipulation}

/* 樹種タブ */
.species-tabs{display:flex;gap:8px;margin-bottom:12px}
.species-tab{flex:1;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;border:0.5px solid #ccc;border-radius:10px;background:#f5f5f5;color:#888;text-align:center;touch-action:manipulation}
.species-tab.sel-sugi{background:#C8773A!important;border-color:#C8773A!important;color:#fff!important}
.species-tab.sel-hinoki{background:#4A9E5C!important;border-color:#4A9E5C!important;color:#fff!important}
.species-tab.sel-other{background:#7D6608!important;border-color:#7D6608!important;color:#fff!important}
.species-tab.sel-total{background:#5B7FA6!important;border-color:#5B7FA6!important;color:#fff!important}
.species-tab.sel-other{background:#7D6608!important;border-color:#7D6608!important;color:#fff!important}
.owner-panel{display:none}.owner-panel.active{display:block}
.species-panel{display:none}.species-panel.active{display:block}

/* 長さタブ */
.len-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.len-tab{flex:1;min-width:52px;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #ccc;border-radius:8px;background:#f5f5f5;color:#888;text-align:center;touch-action:manipulation}
.len-tab.sel-sugi{background:#C8773A!important;border-color:#C8773A!important;color:#fff!important}
.len-tab.sel-hinoki{background:#4A9E5C!important;border-color:#4A9E5C!important;color:#fff!important}
.len-tab.sel-other{background:#7D6608!important;border-color:#7D6608!important;color:#fff!important}
.lc-panel{display:none}.lc-panel.active{display:block}

/* ツールバー */
.lc-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
button{padding:9px 16px;font-size:14px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f5;color:#333;cursor:pointer;touch-action:manipulation}
button:active{opacity:0.7}

/* サマリー */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#f5f5f5;border-radius:10px;padding:10px 14px}
.metric-label{font-size:12px;color:#999;margin-bottom:2px}
.metric-value{font-size:22px;font-weight:600;color:#333}
.metric-unit{font-size:13px;color:#999;margin-left:2px}

/* 径級グリッド */
.section-label{font-size:12px;font-weight:500;color:#999;margin:0 0 8px}
.lc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.lc-cell{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:10px 6px;text-align:center;transition:transform 0.1s}
.lc-cell.flash{transform:scale(1.06)}
.lc-cell.last-count{background:#e74c3c!important;border-color:#e74c3c!important;}
.lc-cell.last-count .lc-diameter{color:#333!important;}
.lc-cell.last-count .lc-vol{color:#333!important;}
.lc-cell.last-count .lc-count{color:#333!important;}
.lc-cell.hi-sugi{border-color:#C8773A!important;background:#FDF0E6!important}
.lc-cell.hi-sugi .lc-diameter,.lc-cell.hi-sugi .lc-count{color:#7B4A1E}
.lc-cell.hi-sugi .lc-vol{color:#A05C2A}
.lc-cell.hi-hinoki{border-color:#4A9E5C!important;background:#E8F5EC!important}
.lc-cell.hi-hinoki .lc-diameter,.lc-cell.hi-hinoki .lc-count{color:#1E5C2A}
.lc-cell.hi-hinoki .lc-vol{color:#2D7A3A}
.lc-diameter{font-size:14px;font-weight:600;color:#333;margin-bottom:1px}
.lc-vol{font-size:10px;color:#999;margin-bottom:6px;min-height:14px}
.lc-controls{display:flex;align-items:center;justify-content:center;gap:4px}
.lc-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;cursor:pointer;border:0.5px solid #ccc;background:#fff;color:#333;line-height:1;padding:0;flex-shrink:0;touch-action:manipulation}
.lc-btn.minus{color:#999}
.lc-btn.plus-sugi{border-color:#C8773A!important;color:#C8773A!important}
.lc-btn.plus-hinoki{border-color:#4A9E5C!important;color:#4A9E5C!important}
.lc-count{font-size:20px;font-weight:600;min-width:26px;text-align:center;color:#333}

/* 履歴 */
.bottom-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
.history-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.history-table th{text-align:left;font-size:11px;font-weight:500;color:#999;padding:4px 5px;border-bottom:0.5px solid #eee}
.history-table td{padding:6px 5px;border-bottom:0.5px solid #eee;color:#333}
.history-table tr:last-child td{border-bottom:none}
.log-history-area{margin-top:14px;border-top:0.5px solid #eee;padding-top:12px}
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <h1 style="margin:0">🌲 ログカウンター</h1>
  <div style="display:flex;gap:6px">
    <button onclick="toggleRecords()" style="font-size:12px;padding:6px 10px;background:#E8F0FC;border:0.5px solid #5B7FA6;color:#5B7FA6;border-radius:8px">📋 記録一覧</button>
    <button onclick="clearAllData()" style="font-size:12px;padding:6px 10px;background:#fee;border:0.5px solid #fcc;color:#c00;border-radius:8px">🗑 全削除</button>
  </div>
</div>
<div id="records-panel" style="display:none;border:0.5px solid #ddd;border-radius:10px;margin-bottom:12px;overflow:hidden;max-height:400px;overflow-y:auto"></div>

<div class="header-card">
  <div style="grid-column:1/-1;font-size:13px;font-weight:600;color:#555;margin-bottom:4px">📋 現場情報</div>
  <div class="header-field">
    <label>日付</label>
    <input type="date" id="hdr-date">
  </div>
  <div class="header-field">
    <label>現場名</label>
    <input type="text" id="hdr-site" placeholder="例: ○○山林">
  </div>
  <div class="header-field" style="grid-column:1/-1">
    <label>納入先</label>
    <input type="text" id="hdr-dest" placeholder="例: ○○製材">
  </div>
</div>

<div class="voice-bar">
  <div class="voice-mic" id="voice-mic"></div>
  <div class="voice-info">
    <div class="voice-status" id="voice-status">音声認識: 起動中...</div>
    <div class="voice-result" id="voice-result">話しかけてください</div>
    <div class="voice-help">【カウント】「6」+1 ／「14センチ3本」+3 ／「マイナス6」-1<br>【切替】「スギ」「ヒノキ」「4メートル」<br>【入力】「日付 6月27日」「山林名 ○○山林」「山主名 山田太郎」「今日の日付」<br>【操作】「保存」「リセット」</div>
  </div>
  <button onclick="toggleVoice()" id="voice-toggle-btn" style="font-size:12px;padding:6px 10px;border-radius:8px;background:#eee;border:0.5px solid #ccc;color:#999;white-space:nowrap">一時停止</button>
</div>

<div class="owner-section">
  <div class="owner-section-label">山主名（選択中のタブをタップで名前を編集）</div>
  <div class="owner-tabs-wrap" id="owner-tabs-wrap"></div>
</div>

<div id="owner-panels"></div>

<script>
const SPECIES=['sugi','hinoki'];
const SNAME={sugi:'スギ',hinoki:'ヒノキ',other:'その他'};
const customSpeciesName={}; // 山主ごとのカスタム樹種名
let customSpecies=[]; // 追加カスタム樹種リスト [{id:'cs1', name:'マツ'}, ...]
let customSpeciesCounter=0;
const LENGTHS=[2,3,4,5,6,7,8];
const SMALL=[6,7,8,9,10,11,12,13];
const LARGE=[];
for(let d=14;d<=80;d+=2)LARGE.push(d);
const DIAMETERS=[...SMALL,...LARGE];

let owners=[{id:1,name:'山主1'}];
let ownerIdCounter=1;
let currentOwnerId=1;
const ownerSpecies={};const ownerLen={};const state={};const histories={};

function initOwner(id){
  ownerSpecies[id]='sugi';ownerLen[id]={sugi:4,hinoki:4};
  state[id]={};histories[id]={};
  SPECIES.forEach(s=>{state[id][s]={};histories[id][s]={};
    LENGTHS.forEach(l=>{state[id][s][l]={};histories[id][s][l]=[];DIAMETERS.forEach(d=>state[id][s][l][d]=0);});
  });
}
initOwner(1);
document.getElementById('hdr-date').value=new Date().toISOString().slice(0,10);

function calcVol(d,l){
  // LogCounter方式: 4m・5mはそのまま、6m以上は末口径に(l-4)/2cmを加算
  const d2 = (l<=5) ? d : d + (l-4)/2;
  return (d2*d2*l)/10000;
}
function hiClass(s){return s==='other'?'hi-sugi':'hi-'+s;}
function plusClass(s){return s==='other'?'plus-sugi':'plus-'+s;}
function curSpecies(){return ownerSpecies[currentOwnerId];}
function curLen(){return ownerLen[currentOwnerId][curSpecies()];}

/*  復唱（音声読み上げ）  */
// 整数を漢数字読みに変換（英語音声化を防ぐ）
function numToKanji(n){
  // ひらがなで指定し読み間違いを防ぐ
  // 8を含む場合は「ハチ」（カタカナ）で発音を強調
  const digits=['','イチ','ニ','サン','ヨン','ゴ','ロク','ナナ','ハチ','キュウ'];
  n=parseInt(n);
  if(isNaN(n))return String(n);
  if(n===0)return 'ゼロ';
  let result='';
  if(n>=10){
    const tens=Math.floor(n/10);
    const ones=n%10;
    if(tens===1)result+='じゅう';
    else result+=digits[tens]+'じゅう';
    if(ones>0)result+=digits[ones];
  }else{
    result=digits[n];
  }
  return result;
}

// 小数を「整数点小数部分」の形で読み上げ用に変換（例: 0.029 -> 零点零二九）
function decimalToSpeech(numStr){
  const parts=numStr.split('.');
  const intPart=parts[0];
  const decPart=parts[1];
  const dArr=['ゼロ','イチ','ニ','サン','ヨン','ゴ','ロク','ナナ','ハチ','キュウ'];
  let intSpeech=numToKanji(intPart);
  let decSpeech='';
  if(decPart){
    // 1桁ずつ読点で区切ってゆっくり読ませる
    decSpeech='、テン、'+decPart.split('').map(d=>dArr[parseInt(d)]).join('、');
  }
  return intSpeech+decSpeech;
}

// テキスト中の数字を漢数字に変換（小数も対応）
function convertNumbersForSpeech(text){
  // 先に小数（X.X）を変換
  text=text.replace(/\d+\.\d+/g,(match)=>decimalToSpeech(match));
  // 残りの整数を変換
  text=text.replace(/\d+/g,(match)=>numToKanji(match));
  return text;
}

let bestJaVoice=null;

function loadJaVoice(){
  if(bestJaVoice)return;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length===0)return;
  // 優先順位：Google日本語 > Microsoft日本語 > その他日本語
  const preferred=[
    'Google 日本語',
    'Google Japanese',
    'Microsoft Nanami Online',
    'Microsoft Haruka',
    'O-Ren',
    'Kyoko',
    'Otoya',
  ];
  for(const name of preferred){
    const v=voices.find(v=>v.name.includes(name)&&v.lang.startsWith('ja'));
    if(v){bestJaVoice=v;break;}
  }
  // 見つからなければja-JPの声を使う
  if(!bestJaVoice){
    bestJaVoice=voices.find(v=>v.lang==='ja-JP')||voices.find(v=>v.lang.startsWith('ja'));
  }
}

// 声の読み込みは非同期なので起動時とvoiceschanged時に取得
window.speechSynthesis.onvoiceschanged=loadJaVoice;
setTimeout(loadJaVoice,500);

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  loadJaVoice();
  const converted=convertNumbersForSpeech(text);
  const u=new SpeechSynthesisUtterance(converted);
  u.lang='ja-JP';u.rate=1.0;u.pitch=1.5;u.volume=1.0;
  if(bestJaVoice)u.voice=bestJaVoice;
  window.speechSynthesis.speak(u);
}

/*  音声認識  */
let recognition=null;
let voiceOn=false;
let lastDiam=null; // 直近にカウントした径級
let waitingInput=null; // 入力待ち状態: 'siteName' | 'destName' | null
let recentHistory=[]; // 直近5つの履歴 {d, s, l, oid}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('このブラウザは音声認識に対応していません。Android ChromeまたはEdgeをお使いください。');return;
  }
  voiceOn?pauseVoice():resumeVoice();
}

function startVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=3; // 複数の候補を取得して最適なものを選ぶ
  let lastProcessed='';
  let lastProcessedTime=0;
  recognition.onresult=async e=>{
    // 確定した結果のみ処理
    let finalTxt='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        finalTxt+=e.results[i][0].transcript.trim();
      }
    }
    if(finalTxt){
      // 同じテキストが1秒以内に重複処理されるのを防ぐ
      const now=Date.now();
      if(finalTxt===lastProcessed&&now-lastProcessedTime<1000)return;
      lastProcessed=finalTxt;
      lastProcessedTime=now;

      // 複数候補から山主名にマッチするものを優先
      let bestTxt=finalTxt;
      const results=e.results[e.results.length-1];
      for(let k=0;k<results.length;k++){
        const candidate=results[k].transcript.trim();
        // ひらがなの候補があれば優先
        if(/^[ぁ-ん\s]+$/.test(candidate)){bestTxt=candidate;break;}
        // 山主名にマッチする候補があれば優先
        const toH=s=>s.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
        if(owners.some(o=>toH(candidate).includes(toH(o.name))||toH(o.name).includes(toH(candidate)))){
          bestTxt=candidate;break;
        }
      }

      const hiraResult=kanjiToHira(bestTxt);
      document.getElementById('voice-result').textContent='認識: '+bestTxt+(hiraResult!==bestTxt?' ('+hiraResult+')':'');
      const finalTxtToProcess=bestTxt;
      const finalTxt2=finalTxtToProcess||finalTxt;
      const simpleMatch=finalTxt2.match(/^[\d一二三四五六七八九十百]+$/)
        ||finalTxt.includes('スギ')||finalTxt.includes('ヒノキ')||finalTxt.includes('杉')||finalTxt.includes('檜')
        ||finalTxt.includes('マイナス')||finalTxt.includes('まいなす')||finalTxt.includes('保存')
        ||finalTxt.includes('リセット')||finalTxt.includes('メートル')
        ||finalTxt.includes('センチ')
        ||finalTxt.includes('今日')
        ||finalTxt.includes('日付')
        ||finalTxt.trim()==='-'||finalTxt.trim()==='ー'||finalTxt.trim()==='−'
        ||finalTxt.length<=4; // 短いテキストは直接処理（AI補正でハイフン等に変換されるのを防ぐ）
      if(simpleMatch){
        processVoice(finalTxt2);
      } else {
        document.getElementById('voice-result').textContent='補正中: '+finalTxt2;
        const corrected=await correctVoice(finalTxt2);
        document.getElementById('voice-result').textContent='補正後: '+corrected;
        processVoice(corrected);
      }
    }
  };
  let restarting=false;
  recognition.onerror=e=>{
    if(e.error==='not-allowed'){
      alert('マイクの使用が許可されていません。\nブラウザのアドレスバーからマイクを許可してください。');
      document.getElementById('voice-status').textContent='マイク許可が必要です';
      return;
    }
    // no-speech, aborted等は無視（onendで処理される）
  };
  recognition.onend=()=>{
    if(voiceOn&&!restarting){
      restarting=true;
      // 即座に再起動（待機時間なしで連続性を保つ）
      try{
        recognition.start();
        restarting=false;
      }catch(e){
        // すでに開始されている場合などのエラーは無視して少し待って再試行
        setTimeout(()=>{
          restarting=false;
          if(voiceOn){
            try{recognition.start();}catch(e2){
              setTimeout(()=>{if(voiceOn)startVoice();},300);
            }
          }
        },50);
      }
    }
  };
  recognition.start();
  voiceOn=true;
  document.getElementById('voice-mic').className='voice-mic';
  document.getElementById('voice-status').textContent='音声認識: ON';
  document.getElementById('voice-toggle-btn').textContent='一時停止';
}

function pauseVoice(){
  if(recognition){recognition.onend=null;recognition.stop();recognition=null;}
  voiceOn=false;
  document.getElementById('voice-mic').className='voice-mic paused';
  document.getElementById('voice-status').textContent='音声認識: 一時停止中';
  document.getElementById('voice-result').textContent='「再開」ボタンで再開できます';
  document.getElementById('voice-toggle-btn').textContent='再開';
}

function resumeVoice(){
  startVoice();
  speak('音声認識を再開しました');
}

function stopVoice(){
  if(recognition){recognition.onend=null;recognition.stop();recognition=null;}
  voiceOn=false;
}

/* 数字変換 */
const numKanji={'〇':0,'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
function parseNum(s){
  if(!s)return null;
  // 全角数字->半角
  s=s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-65248));
  const n=parseInt(s);if(!isNaN(n))return n;
  // 漢数字（簡易）
  const map2={'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,
    '二十':20,'二十一':21,'二十二':22,'二十三':23,'二十四':24,'二十五':25,'二十六':26,'二十七':27,'二十八':28,'二十九':29,

// AI補正：認識テキストをログカウンター用コマンドに変換
async function correctVoice(txt){
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:100,
        system:`あなたはログカウンター（丸太材積計算）アプリの音声コマンド変換器です。
ユーザーの音声認識テキストを以下のコマンド形式に変換してください。
コマンド形式：
- 数字のみ（例：「6」「14」「24」）-> その径級にカウント
- 「マイナス」-> 直前のカウントを取消（必ず「マイナス」という日本語の文字列で出力すること。記号の「-」は絶対使わない）
- 「スギ」または「ヒノキ」-> 樹種切替
- 「XXメートル」-> 長さ切替（4〜8）
- 「保存」-> 保存
- 「リセット」-> リセット
- 「山林名 XXXX」-> 山林名入力
- 「山主名 XXXX」-> 山主名入力
- 「今日の日付」-> 今日の日付
音声認識の誤りを修正して、最も近いコマンドを出力してください。
コマンドのテキストのみ出力し、説明は不要です。記号やハイフンではなく必ず日本語の単語で出力してください。`,
        messages:[{role:"user",content:txt}]
      })
    });
    const data=await response.json();
    if(data.content&&data.content[0]){
      return data.content[0].text.trim();
    }
  }catch(e){
  }
  return txt; // 失敗時は元のテキストを返す
}

// 漢字をひらがなに変換（Web Speech APIの読みを利用）
function kanjiToHira(str){
  // カタカナをひらがなに変換
  str=str.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
  return str;
}

function processVoice(txt){
  // カタカナをひらがなに変換
  txt=kanjiToHira(txt);
  // 音声認識の誤変換を修正
  txt=txt
    .replace(/製剤/g,'製材')
    .replace(/正材/g,'製材')
    .replace(/制材/g,'製材')
    .replace(/精材/g,'製材')
    .replace(/三輪名/g,'山林名')
    .replace(/3輪名/g,'山林名')
    .replace(/参林名/g,'山林名')
    .replace(/さんりん名/g,'山林名')
    .replace(/山梨名/g,'山林名').replace(/現場名/g,'現場名');
  const oid=currentOwnerId;const s=curSpecies();const l=curLen();

  // 入力待ち状態の処理
  if(waitingInput){
    const name=txt.trim();

    waitingInput=null;
    return;
  }

  // マイクOFF
  if(txt.includes('マイクオフ')||txt.includes('マイクOFF')||txt.includes('マイクoff')||txt.includes('マイク消して')||txt.includes('マイクを切って')){
    pauseVoice();
    speak('マイクをオフにしました');return;
  }

  // 日付「今日の日付」または「今日」
  if(txt.includes('今日の日付')||txt==='今日'){
    const today=new Date().toISOString().slice(0,10);
    document.getElementById('hdr-date').value=today;
    const disp=new Date().toLocaleDateString('ja-JP');
    setStatus('日付: '+disp);speak(disp);return;
  }

  // 日付「日付 令和XX年XX月XX日」「日付 XX月XX日」など
  const dateMatch=txt.match(/日付\s*(.+)/);
  if(dateMatch){
    const raw=dateMatch[1].trim();
    const reiwaMatch=raw.match(/令和\s*(\d+|元)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
    const seirekiMatch=raw.match(/(\d{4})\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
    const monthDayMatch=raw.match(/(\d+)\s*月\s*(\d+)\s*日/);
    let dateVal=null;
    if(reiwaMatch){
      const y=reiwaMatch[1]==='元'?2019:2018+parseInt(reiwaMatch[1]);
      const m=String(reiwaMatch[2]).padStart(2,'0');
      const d=String(reiwaMatch[3]).padStart(2,'0');
      dateVal=y+'-'+m+'-'+d;
    }else if(seirekiMatch){
      const m=String(seirekiMatch[2]).padStart(2,'0');
      const d=String(seirekiMatch[3]).padStart(2,'0');
      dateVal=seirekiMatch[1]+'-'+m+'-'+d;
    }else if(monthDayMatch){
      const y=new Date().getFullYear();
      const m=String(monthDayMatch[1]).padStart(2,'0');
      const d=String(monthDayMatch[2]).padStart(2,'0');
      dateVal=y+'-'+m+'-'+d;
    }
    if(dateVal){
      document.getElementById('hdr-date').value=dateVal;
      const disp=new Date(dateVal+'T00:00:00').toLocaleDateString('ja-JP');
      setStatus('日付: '+disp);speak(disp);return;
    }
  }

  // 「山主1」「山主2」などの番号で切替（最優先で処理）
  const ownerNumMatch2=txt.match(/山主([1-9１-９一二三四五六七八九])/);
  if(ownerNumMatch2){
    let num=parseInt(ownerNumMatch2[1]);
    if(isNaN(num)){
      const kanji=['一','二','三','四','五','六','七','八','九'];
      const zen=['１','２','３','４','５','６','７','８','９'];
      const ki=kanji.indexOf(ownerNumMatch2[1]);
      const zi=zen.indexOf(ownerNumMatch2[1]);
      num=ki>=0?ki+1:zi>=0?zi+1:num;
    }
    if(num>0&&num<=owners.length){
      const o=owners[num-1];
      switchOwner(o.id);
      speak(o.name);return;
    }
  }

  // 山主切替：名前で呼ぶと山主タブを切替
  if(!waitingInput){
    // カタカナ→ひらがな変換
    function toHira(str){return str.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
    // txtはすでにkanjiToHiraで変換済みなのでひらがなベースで照合
    const txtHira=toHira(kanjiToHira(txt));
    const matchedOwner=owners.find(o=>{
      if(o.name.length<=1)return false;
      const nameHira=toHira(kanjiToHira(o.name));
      const yomiHira=toHira(o.yomi||'');
      // 読み（ひらがな）で照合を優先
      if(yomiHira&&(txtHira===yomiHira||txtHira.includes(yomiHira)||yomiHira.includes(txtHira)))return true;
      // 名前のひらがな変換でも照合
      return txtHira===nameHira||txtHira.includes(nameHira)||nameHira.includes(txtHira);
    });
    if(matchedOwner){
      switchOwner(matchedOwner.id);
      speak(matchedOwner.name);return;
    }
  }



  // 山林名：「山林名」だけ言ったら入力待ちに


  // 行先名：「行先名」だけ言ったら入力待ちに


  // 「XXXX山」->山林名に自動入力
  const sanMatch=txt.match(/^(.+)[山やま]$/);
  if(sanMatch&&!txt.includes('山主')&&!txt.includes('山林')){
    const name=sanMatch[0].trim();
    document.getElementById('hdr-site').value=name;
    setStatus('現場名: '+name);speak(name);return;
  }

  // 「XXXX行」->行先名に自動入力
  const yukiMatch=txt.match(/^(.+)[行いき]$/);
  if(yukiMatch&&!txt.includes('行先')){
    const name=yukiMatch[0].trim();
    document.getElementById('hdr-dest').value=name;
    setStatus('納入先: '+name);speak(name);return;
  }

  // 山主名「山主名 XXXX」
  const ownerVoiceMatch=txt.match(/山主名\s*(.+)/)||txt.match(/山主\s*(.+)/);
  if(ownerVoiceMatch){
    const name=ownerVoiceMatch[1].trim();
    const owner=owners.find(o=>o.id===currentOwnerId);
    if(owner){owner.name=name;renderOwnerTabs();setStatus('山主名: '+name);speak(name);return;}
  }

  // 樹種
  if(txt.includes('スギ')||txt.includes('杉')||txt.includes('すぎ')||txt.includes('過ぎ')||txt.includes('SUGI')||txt.toLowerCase().includes('sugi')){
    switchSpecies(oid,'sugi');
    setStatus('樹種切替: スギ');speak('スギに切り替えました');return;
  }
  if(txt.includes('ヒノキ')||txt.includes('檜')||txt.includes('桧')||txt.includes('ひのき')||txt.includes('日の木')||txt.includes('火の気')||txt.includes('陽の木')||txt.includes('HINOKI')||txt.toLowerCase().includes('hinoki')){
    switchSpecies(oid,'hinoki');
    setStatus('樹種切替: ヒノキ');speak('ヒノキに切り替えました');return;
  }

  // 長さ
  const lenMatch=txt.match(/([2-8２-８二三四五六七八])\s*(メートル|ｍ|m|米)/i);
  if(lenMatch){
    let lv=lenMatch[1].replace(/[４-８]/,c=>String.fromCharCode(c.charCodeAt(0)-65248));
    if(lv==='二')lv='2';else if(lv==='三')lv='3';else if(lv==='四')lv='4';else if(lv==='五')lv='5';else if(lv==='六')lv='6';else if(lv==='七')lv='7';else if(lv==='八')lv='8';
    const lnum=parseInt(lv);
    if(LENGTHS.includes(lnum)){
      switchLen(oid,s,lnum);
      setStatus(`長さ切替: ${lnum}m`);speak(`${lnum}メートルに切り替えました`);return;
    }
  }

  // 「マイナス」だけ -> 直近の径級を-1（iPhoneでは「-」記号として認識されることがある）
  const minusOnly=txt.trim().replace(/[。、．,\s！!？?]/g,'');
  if(minusOnly==='マイナス'||minusOnly==='まいなす'||minusOnly.toLowerCase()==='minus'||minusOnly==='-'||minusOnly==='ー'||minusOnly==='−'||minusOnly==='ｰ'){
    if(lastDiam!==null&&DIAMETERS.includes(lastDiam)){
      if(state[oid][s][l][lastDiam]>0){
        state[oid][s][l][lastDiam]--;
        updateCell(oid,s,l,lastDiam);flashCell(oid,s,l,lastDiam);
        updateRecentBar(oid,s,l,lastDiam,true);
        setStatus(lastDiam+'cm -1本（取消）');speak('マイナス'+lastDiam);
      }else{
        setStatus(lastDiam+'cmはすでに0です');speak(lastDiam+'はゼロです');
      }
    }else{
      speak('直近のカウントがありません');setStatus('直近のカウントなし');
    }
    return;
  }

  // 保存
  if(txt.includes('保存')){
    saveLog(oid,s,l);
    setStatus('保存しました');speak('保存');return;
  }

  // リセット
  if(txt.includes('リセット')){
    if(confirm(`${SNAME[s]} ${l}mのカウントをリセットしますか？`)){
      DIAMETERS.forEach(d=>state[oid][s][l][d]=0);
      buildGrid(oid,s,l);updateSummary(oid,s,l);
      setStatus('リセットしました');speak('リセット');
    }
    return;
  }

  // 径級コマンド（「XXセンチ」または数字だけ）
  const isMinus=txt.includes('マイナス')||txt.includes('引く')||txt.includes('減');

  // 「XXが[XX本]」形式（例：6が10本）
  const gaMatch=txt.match(/(\d+|[一二三四五六七八九十百]+)\s*が\s*(\d+|[一二三四五六七八九十]+)\s*本/);
  if(gaMatch){
    const diam=parseNum(gaMatch[1]);
    const count=parseNum(gaMatch[2]);
    if(!DIAMETERS.includes(diam)){
      speak(`${diam}は対象外です`);setStatus(`${diam}cmは対象外`);return;
    }
    if(isMinus){
      for(let i=0;i<count;i++){if(state[oid][s][l][diam]>0)state[oid][s][l][diam]--;}
      updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
      updateRecentBar(oid,s,l,diam,true);
      setStatus(`${diam}cm -${count}本`);speak(`${diam}センチ、マイナス${count}ホン`);
    }else{
      for(let i=0;i<count;i++)state[oid][s][l][diam]++;
      updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
      lastDiam=diam;
      updateRecentBar(oid,s,l,diam,false);
      setStatus(`${diam}cm +${count}本`);speak(`${diam}センチ、プラス${count}ホン`);
    }
    return;
  }

  // 「XXセンチ [XX本] [マイナス]」形式
  const cmMatch=txt.match(/(\d+|[一二三四五六七八九十百]+)\s*(センチ|cm|ｃｍ|せんち)/i);
  if(cmMatch){
    const diam=parseNum(cmMatch[1]);
    if(!DIAMETERS.includes(diam)){
      speak(`${diam}センチは対象外です`);setStatus(`${diam}cmは対象外`);return;
    }
    const honMatch=txt.match(/(\d+|[一二三四五六七八九十]+)\s*(本|ほん)/);
    const count=honMatch?parseNum(honMatch[1]):1;
    if(isMinus){
      for(let i=0;i<count;i++){if(state[oid][s][l][diam]>0)state[oid][s][l][diam]--;}
      updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
      updateRecentBar(oid,s,l,diam,true);
      setStatus(`${diam}cm -${count}本`);speak(`${diam}センチ、マイナス${count}ホン`);
    }else{
      for(let i=0;i<count;i++)state[oid][s][l][diam]++;
      updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
      lastDiam=diam;
      updateRecentBar(oid,s,l,diam,false);
      setStatus(`${diam}cm +${count}本`);speak(`${diam}センチ、プラス${count}ホン`);
    }
    return;
  }

  // 数字だけ（例:「6」「14」「二十四」）-> +1 または マイナスなら -1
  const numOnlyMatch=txt.match(/^(\d+|[一二三四五六七八九十百]+)$/)
    || txt.match(/^マイナス\s*(\d+|[一二三四五六七八九十百]+)$/)
    || txt.match(/^(\d+|[一二三四五六七八九十百]+)\s*マイナス$/);

  // 数字抽出（マイナスを除いた数字部分）
  const numRaw=txt.replace(/マイナス|引く|減/g,'').trim();
  const numMatch=numRaw.match(/^(\d+|[一二三四五六七八九十百]+)$/);
  if(numMatch){
    const diam=parseNum(numMatch[1]);
    if(diam!==null&&DIAMETERS.includes(diam)){
      if(isMinus){
        if(state[oid][s][l][diam]>0)state[oid][s][l][diam]--;
        updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
        updateRecentBar(oid,s,l,diam,true);
        setStatus(`${diam}cm -1本`);speak(`${diam}センチ、マイナスイチホン`);
      }else{
        state[oid][s][l][diam]++;
        updateCell(oid,s,l,diam);flashCell(oid,s,l,diam);
        lastDiam=diam;
        updateRecentBar(oid,s,l,diam,false);
        setStatus(`${diam}cm +1本`);speak(String(diam));
      }
      return;
    }
  }

  // 空文字や極端に短いテキスト（誤検知）は無視
  if(!txt||txt.trim().length===0)return;
  setStatus(`認識できませんでした: 「${txt}」`);
}

function setStatus(msg){
  document.getElementById('voice-status').textContent='[OK] '+msg;
  setTimeout(()=>{
    document.getElementById('voice-status').textContent=voiceOn?'音声認識: ON':'音声認識: OFF  ボタンでONにしてください';
  },2500);
}

let lastHighlightCell=null;

// 直近履歴を更新して表示
function updateRecentBar(oid,s,l,d,isMinus){
  try{
    // 履歴に追加（最大5件）
    recentHistory.unshift({d:d,s:s,l:l,oid:oid,minus:isMinus?true:false});
    if(recentHistory.length>5)recentHistory.splice(5);

    // 現在表示中のパネルのバーを更新（同じoid・s・lのもののみ表示）
    var barId='recent-bar-'+oid+'-'+s+'-'+l;
    var bar=document.getElementById(barId);
    if(!bar)return;
    var filtered=[];
    for(var i=0;i<recentHistory.length;i++){
      var r=recentHistory[i];
      if(r.oid===oid&&r.s===s&&r.l===l)filtered.push(r);
    }
    if(filtered.length===0){bar.innerHTML='';return;}
    var html='';
    for(var j=0;j<filtered.length;j++){
      var r=filtered[j];
      var prefix=r.minus?'-':'';
      var bg=r.minus?'#FADBD8':'#f5f5f5';
      var border=r.minus?'#e74c3c':'#ddd';
      html+='<div style="padding:5px 10px;border-radius:8px;background:'+bg+';color:#333;font-size:14px;font-weight:600;border:0.5px solid '+border+'">'+prefix+r.d+'</div>';
    }
    bar.innerHTML=html;
  }catch(e){
    // エラーが起きても処理は止めない
  }
}

function flashCell(oid,s,l,d){
  // 全セルからlast-countとhi-sugi/hi-hinokiを削除
  document.querySelectorAll('.last-count').forEach(el=>{
    el.classList.remove('last-count');
    el.classList.remove('hi-sugi');
    el.classList.remove('hi-hinoki');
  });
  const cell=document.getElementById(`cell-${oid}-${s}-${l}-${d}`);
  if(!cell)return;
  // フラッシュアニメーション
  cell.classList.add('flash');
  setTimeout(()=>cell.classList.remove('flash'),300);
  // 直近ハイライト（赤背景）
  cell.classList.add('last-count');
  lastHighlightCell=cell;
}

/*  山主タブ  */
function renderOwnerTabs(){
  const wrap=document.getElementById('owner-tabs-wrap');wrap.innerHTML='';
  owners.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='owner-tab'+(o.id===currentOwnerId?' active':'');btn.id=`otab-${o.id}`;
    const nameEl=document.createElement('span');nameEl.className='owner-tab-name';nameEl.textContent=o.name;
    nameEl.addEventListener('click',e=>{e.stopPropagation();if(o.id===currentOwnerId)startEditOwnerName(o.id,nameEl,btn);else switchOwner(o.id);});
    btn.addEventListener('click',()=>{if(o.id!==currentOwnerId)switchOwner(o.id);});
    btn.appendChild(nameEl);
    if(owners.length>1){
      const del=document.createElement('span');del.className='owner-del';del.textContent='x';
      del.addEventListener('click',e=>{e.stopPropagation();deleteOwner(o.id);});btn.appendChild(del);
    }
    wrap.appendChild(btn);
  });
  const addBtn=document.createElement('button');addBtn.className='add-owner-btn';addBtn.textContent='＋ 追加';
  addBtn.addEventListener('click',addOwner);wrap.appendChild(addBtn);
}

function startEditOwnerName(id,nameEl,btn){
  const owner=owners.find(o=>o.id===id);
  const input=document.createElement('input');input.className='inline-edit';input.value=owner.name;
  btn.replaceChild(input,nameEl);input.focus();input.select();
  function finish(){owner.name=input.value.trim()||owner.name;renderOwnerTabs();}
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=owner.name;input.blur();}});
}

function addOwner(){
  ownerIdCounter++;const id=ownerIdCounter;
  owners.push({id,name:`山主${owners.length+1}`,yomi:''});initOwner(id);renderOwnerTabs();buildOwnerPanels();switchOwner(id);
  setTimeout(()=>{const btn=document.getElementById(`otab-${id}`);const nameEl=btn?btn.querySelector('.owner-tab-name'):null;if(btn&&nameEl)startEditOwnerName(id,nameEl,btn);},50);
}

function deleteOwner(id){
  if(owners.length===1){alert('山主を削除できません（最低1名必要です）');return;}
  if(!confirm(`「${owners.find(o=>o.id===id).name}」を削除しますか？`))return;
  owners=owners.filter(o=>o.id!==id);
  const panel=document.getElementById(`owner-panel-${id}`);if(panel)panel.remove();
  if(currentOwnerId===id)switchOwner(owners[0].id);else renderOwnerTabs();
}

function switchOwner(id){
  currentOwnerId=id;renderOwnerTabs();
  document.querySelectorAll('.owner-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`owner-panel-${id}`).classList.add('active');
  const owner=owners.find(o=>o.id===id);
  if(owner) speak(owner.name);
}

/*  パネル構築  */
function buildOwnerPanels(){
  const container=document.getElementById('owner-panels');
  owners.forEach(o=>{
    if(document.getElementById(`owner-panel-${o.id}`))return;
    const div=document.createElement('div');div.className='owner-panel'+(o.id===currentOwnerId?' active':'');div.id=`owner-panel-${o.id}`;
    div.innerHTML=`
      <div class="species-tabs">
        <button class="species-tab sel-sugi" id="sp-btn-${o.id}-sugi" onclick="switchSpecies(${o.id},'sugi')">スギ</button>
        <button class="species-tab" id="sp-btn-${o.id}-hinoki" onclick="switchSpecies(${o.id},'hinoki')">ヒノキ</button>

function buildReadLines(oid){
  const lines=[];
  const owner=owners.find(o=>o.id===oid);
  const oname=owner?owner.name:'';
  SPECIES.forEach(s=>{
    LENGTHS.forEach(l=>{
      DIAMETERS.forEach(d=>{

        if(cnt>0){

          const spk=`${oname}、${SNAME[s]}、${l}メートル、${d}が${cnt}ホン`;
          lines.push({text,speak:spk,ownerId:oid});
        }
      });
    });
  });
  return lines;
}

function buildAllReadLines(){
  const lines=[];
  owners.forEach(o=>{
    const ol=buildReadLines(o.id);
    lines.push(...ol);
  });
  return lines;
}

// 読み上げ用スマートシーケンス生成
function buildSpeakSequence(){
  const seq=[];
  let prevOwner=null,prevSpecies=null,prevLen=null;
  owners.forEach(o=>{
    let hasData=false;
    SPECIES.forEach(s=>{LENGTHS.forEach(l=>{DIAMETERS.forEach(d=>{if(state[o.id][s][l][d]>0)hasData=true;});});});
    if(!hasData)return;

    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        // この樹種・長さに本数があるか確認
        let groupCnt=0;
        DIAMETERS.forEach(d=>{groupCnt+=state[o.id][s][l][d];});
        if(groupCnt===0)return;

        // 径級ごとに読み上げ
        DIAMETERS.forEach(d=>{
          const cnt=state[o.id][s][l][d];
          if(cnt===0)return;

          const speaks=[];
          // 山主が変わったら名前を読む
          if(o.id!==prevOwner){
            speaks.push(o.name);
            prevOwner=o.id;prevSpecies=null;prevLen=null;
          }
          // 樹種が変わったら樹種を読む
          if(s!==prevSpecies){
            speaks.push(SNAME[s]);
            prevSpecies=s;prevLen=null;
          }
          // 長さが変わったら長さを読む
          if(l!==prevLen){
            speaks.push(l+'メートル');
            prevLen=l;
          }
          // 径級と本数
          speaks.push(d+'が'+cnt+'ホン');
          seq.push({speak:speaks.join('、')});
        });

        // 樹種・長さの小計を読み上げ
        seq.push({speak:'合計'+SNAME[s]+l+'メートル'+groupCnt+'ホン'});
      });
    });
  });
  return seq;
}

function speakAllOwners(){
  window.speechSynthesis.cancel();
  // 山主ごとに「詳細->合計」の順で読み上げシーケンスを生成
  const allSeq=[];
  owners.forEach(o=>{
    let hasData=false;
    SPECIES.forEach(s=>{LENGTHS.forEach(l=>{DIAMETERS.forEach(d=>{if(state[o.id][s][l][d]>0)hasData=true;});});});
    if(!hasData)return;

    let prevSpecies=null,prevLen=null;

    // 詳細読み上げ（樹種・長さ・径級）
    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        let groupCnt=0;
        DIAMETERS.forEach(d=>{groupCnt+=state[o.id][s][l][d];});
        if(groupCnt===0)return;

        DIAMETERS.forEach(d=>{
          const cnt=state[o.id][s][l][d];
          if(cnt===0)return;
          const speaks=[];
          if(!prevSpecies&&!prevLen) speaks.push(o.name);
          if(s!==prevSpecies){speaks.push(SNAME[s]);prevSpecies=s;prevLen=null;}
          if(l!==prevLen){speaks.push(l+'メートル');prevLen=l;}
          speaks.push(d+'が'+cnt+'ホン');
          allSeq.push({speak:speaks.join('、')});
        });

      });
    });

    // 山主ごとの合計サマリー（書き取り用にゆっくり間隔を空ける）
    allSeq.push({speak:'合計、'+o.name,pause:2000,rate:0.8});
    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        let lc=0,lv=0;
        DIAMETERS.forEach(d=>{const cnt=state[o.id][s][l][d];if(cnt>0){lc+=cnt;lv+=calcVol(d,l)*cnt;}});
        if(lc>0){
          allSeq.push({speak:SNAME[s]+l+'メートルが'+lc+'ホン、'+lv.toFixed(3),pause:2000,rate:0.55});
          allSeq.push({speak:'りゅうべい',pause:1500,rate:0.65});
        }
      });
    });
  });

  if(allSeq.length===0){speak('データがありません');return;}
  let i=0;
  function next(){
    if(i>=allSeq.length)return;
    const item=allSeq[i];
    const converted=convertNumbersForSpeech(item.speak);
    const u=new SpeechSynthesisUtterance(converted);
    u.lang='ja-JP';u.rate=item.rate||0.9;u.pitch=1.5;u.volume=1.0;
    if(bestJaVoice)u.voice=bestJaVoice;
    const pauseTime=item.pause||200;
    u.onend=()=>{i++;setTimeout(next,pauseTime);};
    window.speechSynthesis.speak(u);
  }
  next();
}

function speakLine(text){
  window.speechSynthesis.cancel();
  loadJaVoice();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.9;u.pitch=1.5;u.volume=1.0;
  if(bestJaVoice)u.voice=bestJaVoice;
  window.speechSynthesis.speak(u);
}

function stopSpeak(){

}

let speakAllTimer=null;
function speakAll(oid){
  window.speechSynthesis.cancel();
  const lines=buildReadLines(oid);
  if(lines.length===0){speak('データがありません');return;}
  let i=0;
  function next(){
    if(i>=lines.length)return;
    const u=new SpeechSynthesisUtterance(lines[i].speak);
    u.lang='ja-JP';u.rate=0.9;u.pitch=1.5;u.volume=1.0;
    u.onend=()=>{i++;setTimeout(next,300);};
    window.speechSynthesis.speak(u);
  }
  next();
}

  owners.forEach(o=>{

function calcOwnerTotal(oid){
  // 山主1人分の集計（現在カウント中＋保存済み履歴）
  const result={};
  let grandCnt=0,grandVol=0;
  SPECIES.forEach(s=>{
    let tc=0,tv=0;
    LENGTHS.forEach(l=>{
      DIAMETERS.forEach(d=>{const cnt=state[oid][s][l][d];if(cnt>0){tc+=cnt;tv+=calcVol(d,l)*cnt;}});
      histories[oid][s][l].forEach(h=>{tc+=h.totalCnt;tv+=parseFloat(h.totalVol);});
    });
    result[s]={tc,tv};grandCnt+=tc;grandVol+=tv;
  });
  result.grandCnt=grandCnt;result.grandVol=grandVol;
  return result;
}

      <div class="metric" style="margin-bottom:14px;border:1.5px solid #5B7FA6">

  });

  // 全山主の合計（常に表示）
  let allCnt=0,allVol=0;

  LENGTHS.forEach(l=>{
    let totalLenCnt=0,totalLenVol=0;
    let speciesRows='';
    SPECIES.forEach(s=>{
      let lc=0,lv=0;
      owners.forEach(o=>{
        DIAMETERS.forEach(d=>{const cnt=state[o.id][s][l][d];if(cnt>0){lc+=cnt;lv+=calcVol(d,l)*cnt;}});
        histories[o.id][s][l].forEach(h=>{lc+=h.totalCnt;lv+=parseFloat(h.totalVol);});
      });
      if(lc>0){

        speciesRows+=`<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:13px;color:#666">
          <span style="color:${s==='sugi'?'#C8773A':'#4A9E5C'};font-weight:500">　${SNAME[s]}</span>

    if(totalLenCnt>0){

      lenRows+=`
        <div style="border:0.5px solid #eee;border-radius:8px;margin-bottom:6px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;padding:6px 8px;background:#f5f5f5;font-size:14px;font-weight:600">
            <span style="color:#333">${l}m　合計</span>
            <span>${totalLenCnt}本　${totalLenVol.toFixed(3)} m3</span>
          </div>

        </div>`;
    }
  });

  // 山主別・末口別集計（樹種・長さ・径級）
  let diamRows='<p style="font-size:12px;font-weight:500;color:#999;margin:14px 0 6px">山主別・末口別集計</p>';
  let hasDiam=false;
  owners.forEach(o=>{
    let ownerTotal=0,ownerVolTotal=0;
    let ownerRows='';
    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        DIAMETERS.forEach(d=>{
          const cnt=state[o.id][s][l][d];
          if(cnt>0){
            const vol=calcVol(d,l)*cnt;
            ownerTotal+=cnt;ownerVolTotal+=vol;
            ownerRows+=`<div style="display:flex;justify-content:space-between;padding:6px 10px;border-bottom:0.5px solid #eee;font-size:14px">
              <span><span style="color:${s==='sugi'?'#C8773A':'#4A9E5C'};font-weight:600">${SNAME[s]}</span>　${l}m　${d}</span>
              <span style="font-weight:600">${cnt}本　${vol.toFixed(3)} m3</span>
            </div>`;
          }
        });
      });
    });
    if(ownerTotal>0){
      hasDiam=true;
      diamRows+=`
        <div style="border:0.5px solid #5B7FA6;border-radius:8px;margin-bottom:10px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;padding:7px 10px;background:#5B7FA6;font-size:14px;font-weight:600;color:#fff">
            <span>${o.name}</span>
            <span>${ownerTotal}本　${ownerVolTotal.toFixed(3)} m3</span>
          </div>
          ${ownerRows}
        </div>`;
    }
  });

  c.innerHTML=html+(hasLen?lenRows:'')+(hasDiam?diamRows:'');
}

function buildGrid(oid,s,l){
  const grid=document.getElementById(`grid-${oid}-${s}-${l}`);if(!grid)return;
  const hc=hiClass(s);const pc=plusClass(s)||'plus-other';grid.innerHTML='';
  DIAMETERS.forEach(d=>{
    const cnt=state[oid][s][l][d];
    const cell=document.createElement('div');
    cell.className='lc-cell'+(cnt>0?' '+hc:'');cell.id=`cell-${oid}-${s}-${l}-${d}`;
    cell.innerHTML=`
      <div class="lc-diameter">${d} cm</div>
      <div class="lc-vol" id="vol-${oid}-${s}-${l}-${d}">${cnt>0?(calcVol(d,l)*cnt).toFixed(3)+' m3':''}</div>
      <div class="lc-controls">
        <button class="lc-btn minus" onclick="decrement(${oid},'${s}',${l},${d})">－</button>
        <span class="lc-count" id="cnt-${oid}-${s}-${l}-${d}">${cnt}</span>
        <button class="lc-btn ${pc}" onclick="increment(${oid},'${s}',${l},${d})" onmousedown="startLongPress(${oid},'${s}',${l},${d})" onmouseup="cancelLongPress()" onmouseleave="cancelLongPress()" ontouchstart="startLongPress(${oid},'${s}',${l},${d})" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()" oncontextmenu="return false" style="-webkit-user-select:none;user-select:none;-webkit-touch-callout:none">＋</button>
      </div>`;
    grid.appendChild(cell);
  });
}

function updateCell(oid,s,l,d){
  const cnt=state[oid][s][l][d];
  const cell=document.getElementById(`cell-${oid}-${s}-${l}-${d}`);if(!cell)return;
  cell.className='lc-cell'+(cnt>0?' '+hiClass(s):'');
  document.getElementById(`cnt-${oid}-${s}-${l}-${d}`).textContent=cnt;
  document.getElementById(`vol-${oid}-${s}-${l}-${d}`).textContent=cnt>0?(calcVol(d,l)*cnt).toFixed(3)+' m3':'';
  updateSummary(oid,s,l);
}

function updateSummary(oid,s,l){
  let tc=0,tv=0;
  DIAMETERS.forEach(d=>{const c=state[oid][s][l][d];if(c>0){tc+=c;tv+=calcVol(d,l)*c;}});
  document.getElementById(`cnt-total-${oid}-${s}-${l}`).textContent=tc;
  document.getElementById(`vol-total-${oid}-${s}-${l}`).textContent=tv.toFixed(3);
}

setInterval(()=>{

let longPressTimer=null;
let longPressTriggered=false;

function startLongPress(oid,s,l,d){
  longPressTriggered=false;
  longPressTimer=setTimeout(()=>{
    longPressTriggered=true;
    if(navigator.vibrate)navigator.vibrate(30);
    showCountInput(oid,s,l,d);
  },450);
}

function cancelLongPress(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
}

// 本数入力モーダルを表示
function showCountInput(oid,s,l,d){
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  const overlay=document.createElement('div');
  overlay.id='count-input-overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`
    <div style="background:#fff;border-radius:14px;padding:20px;width:280px;max-width:90%">
      <p style="font-size:15px;font-weight:600;margin-bottom:12px;text-align:center">${sname} ${d}cm</p>
      <p style="font-size:13px;color:#999;margin-bottom:10px;text-align:center">何本追加しますか？</p>
      <input type="number" id="count-input-field" value="1" min="1" style="width:100%;font-size:22px;text-align:center;padding:10px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:14px">
      <div style="display:flex;gap:8px">
        <button onclick="closeCountInput()" style="flex:1;padding:10px;background:#eee;border:none;border-radius:8px;font-size:14px">キャンセル</button>
        <button onclick="confirmCountInput(${oid},'${s}',${l},${d})" style="flex:1;padding:10px;background:#5B7FA6;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600">追加</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    const field=document.getElementById('count-input-field');
    if(field){field.focus();field.select();}
  },100);
}

function closeCountInput(){
  const overlay=document.getElementById('count-input-overlay');
  if(overlay)overlay.remove();
}

function confirmCountInput(oid,s,l,d){
  const field=document.getElementById('count-input-field');
  const count=parseInt(field.value);
  closeCountInput();
  if(isNaN(count)||count<=0){alert('正しい本数を入力してください');return;}
  for(let i=0;i<count;i++)state[oid][s][l][d]++;
  updateCell(oid,s,l,d);
  flashCell(oid,s,l,d);
  lastDiam=d;
  updateRecentBar(oid,s,l,d,false);
  speak(`${d}センチ、${count}ホン`);
  saveToLocalStorage();
}

function increment(oid,s,l,d){
  if(longPressTriggered){longPressTriggered=false;return;}
  state[oid][s][l][d]++;
  updateCell(oid,s,l,d);
  lastDiam=d;
  flashCell(oid,s,l,d);
  updateRecentBar(oid,s,l,d,false);
  speak(String(d));
  saveToLocalStorage();
}
function decrement(oid,s,l,d){
  if(state[oid][s][l][d]>0){
    state[oid][s][l][d]--;
    updateCell(oid,s,l,d);
    flashCell(oid,s,l,d);
    updateRecentBar(oid,s,l,d,true);
    speak('マイナス'+d);
    saveToLocalStorage();
  }else{
    speak(d+'はゼロです');
  }
}

function resetPanel(oid,s,l){
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  if(!confirm(`${sname} ${l}mのカウントをリセットしますか？`))return;
  DIAMETERS.forEach(d=>state[oid][s][l][d]=0);
  buildGrid(oid,s,l);
  updateSummary(oid,s,l);
  // 直近履歴もクリア
  recentHistory=recentHistory.filter(r=>!(r.oid===oid&&r.s===s&&r.l===l));
  const bar=document.getElementById(`recent-bar-${oid}-${s}-${l}`);
  if(bar)bar.innerHTML='';
}

function saveLog(oid,s,l){
  let tc=0,tv=0;const bd=[];
  DIAMETERS.forEach(d=>{if(state[oid][s][l][d]>0){const v=calcVol(d,l)*state[oid][s][l][d];tc+=state[oid][s][l][d];tv+=v;bd.push(`${d}cm*${state[oid][s][l][d]}`);}});
  if(tc===0){alert('データがありません');return;}
  const now=new Date();
  const ts=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const owner=owners.find(o=>o.id===oid);
  const hdr=getHeader();
  const ownerName=owner?owner.name:'';

  // 保存名称を生成（日時＋山主名）
  const saveName=`${ts}　${ownerName}　${SNAME[s]}　${l}m`;

  // 確認ダイアログ
  if(!confirm(`以下の内容を保存しますか？

${saveName}

合計: ${tc}本　${tv.toFixed(3)} m3`))return;

  const entry={
    ts,totalCnt:tc,totalVol:tv.toFixed(3),breakdown:bd.join(', '),
    ownerName,
    species:SNAME[s],length:l,
    date:hdr.date,site:hdr.site,dest:hdr.dest,
    saveName
  };
  histories[oid][s][l].unshift(entry);
  saveToLocalStorage();
  saveRecord(entry);
  renderHistory(oid,s,l);
  DIAMETERS.forEach(d=>state[oid][s][l][d]=0);
  buildGrid(oid,s,l);updateSummary(oid,s,l);
  speak('保存しました');
}

// ローカルストレージに全データを保存
function saveToLocalStorage(){
  try{
    const data={
      owners,
      histories,
      date:document.getElementById('hdr-date').value,
      site:document.getElementById('hdr-site').value,
      dest:document.getElementById('hdr-dest').value,
      savedAt:new Date().toISOString()
    };
    localStorage.setItem('logcounter_data',JSON.stringify(data));
  }catch(e){}
}

// 個別の記録を保存一覧に追加
function saveRecord(entry){
  try{
    const raw=localStorage.getItem('logcounter_records');
    const records=raw?JSON.parse(raw):[];
    records.unshift({...entry,id:Date.now()});
    // 最大200件まで保存
    if(records.length>200)records.splice(200);
    localStorage.setItem('logcounter_records',JSON.stringify(records));
  }catch(e){}
}

// 保存一覧を表示

  const c=document.getElementById('records-panel');if(!c)return;

function deleteRecord(id){
  if(!confirm('この記録を削除しますか？'))return;
  try{
    const raw=localStorage.getItem('logcounter_records');
    const records=raw?JSON.parse(raw):[];
    const newRecords=records.filter(r=>r.id!==id);
    localStorage.setItem('logcounter_records',JSON.stringify(newRecords));
    buildRecordsPanel();
  }catch(e){}
}

function clearRecords(){
  if(!confirm('保存された全記録を削除しますか？'))return;
  localStorage.removeItem('logcounter_records');
  buildRecordsPanel();
}

// ローカルストレージから読み込み
function loadFromLocalStorage(){
  try{
    const raw=localStorage.getItem('logcounter_data');
    if(!raw)return false;
    const data=JSON.parse(raw);
    // 日付・山林名・行先名を復元
    if(data.date)document.getElementById('hdr-date').value=data.date;
    if(data.site)document.getElementById('hdr-site').value=data.site;
    if(data.dest)document.getElementById('hdr-dest').value=data.dest;
    // 山主と履歴を復元
    if(data.owners&&data.owners.length>0){
      owners=data.owners;
      ownerIdCounter=Math.max(...owners.map(o=>o.id));
      owners.forEach(o=>{
        if(!histories[o.id]){
          ownerSpecies[o.id]='sugi';
          ownerLen[o.id]={sugi:4,hinoki:4};
          state[o.id]={};histories[o.id]={};
          SPECIES.forEach(s=>{
            state[o.id][s]={};histories[o.id][s]={};
            LENGTHS.forEach(l=>{state[o.id][s][l]={};histories[o.id][s][l]=[];DIAMETERS.forEach(d=>state[o.id][s][l][d]=0);});
          });
        }
      });
      // yomiを復元
      if(data.owners){
        data.owners.forEach(o=>{
          const existing=owners.find(ow=>ow.id===o.id);
          if(existing&&o.yomi)existing.yomi=o.yomi;
        });
      }
      if(data.histories){
        owners.forEach(o=>{
          if(data.histories[o.id]){
            SPECIES.forEach(s=>{
              LENGTHS.forEach(l=>{
                if(data.histories[o.id][s]&&data.histories[o.id][s][l]){
                  histories[o.id][s][l]=data.histories[o.id][s][l];
                }
              });
            });
          }
        });
      }
    }
    return true;
  }catch(e){return false;}
}

// データをクリアする
// 記録を呼び出して入力画面に反映
function restoreRecord(r){
  if(!confirm(`「${r.ownerName||''} ${r.species} ${r.length}m」のデータを呼び出しますか？\n現在のカウントはリセットされます。`))return;

  // 日付・山林名・行先名を復元
  if(r.date)document.getElementById('hdr-date').value=r.date;
  if(r.site)document.getElementById('hdr-site').value=r.site;
  if(r.dest)document.getElementById('hdr-dest').value=r.dest;

  // 山主を特定または作成
  let targetOwner=owners.find(o=>o.name===r.ownerName);
  if(!targetOwner&&r.ownerName){
    // 山主が存在しない場合は新規作成
    ownerIdCounter++;
    const id=ownerIdCounter;
    owners.push({id,name:r.ownerName});
    initOwner(id);
    renderOwnerTabs();
    buildOwnerPanels();
    targetOwner=owners.find(o=>o.id===id);
  }
  if(!targetOwner)targetOwner=owners[0];

  const oid=targetOwner.id;
  const s=r.species==='スギ'?'sugi':'hinoki';
  const l=r.length;

  // 樹種・長さを切替
  switchOwner(oid);
  switchSpecies(oid,s);
  switchLen(oid,s,l);

  // 現在のカウントをリセット
  DIAMETERS.forEach(d=>state[oid][s][l][d]=0);

  // 径級内訳を解析してカウントを復元
  // breakdownは「6cm*3, 14cm*2」形式
  const parts=r.breakdown.split(',');
  parts.forEach(part=>{
    const m=part.trim().match(/(\d+)cm*(\d+)/);
    if(m){
      const d=parseInt(m[1]);
      const cnt=parseInt(m[2]);
      if(DIAMETERS.includes(d))state[oid][s][l][d]=cnt;
    }
  });

  buildGrid(oid,s,l);
  updateSummary(oid,s,l);

  // 記録一覧を閉じる
  document.getElementById('records-panel').style.display='none';

  speak('呼び出しました');
  alert(`「${r.ownerName||''} ${r.species} ${r.length}m」のデータを呼び出しました！`);
}

function toggleRecords(){
  const panel=document.getElementById('records-panel');
  if(panel.style.display==='none'){
    panel.style.display='block';
    buildRecordsPanel();
  } else {
    panel.style.display='none';
  }
}

function clearAllData(){
  if(!confirm('全ての保存データを削除しますか？\nこの操作は元に戻せません。'))return;
  // 全stateをリセット
  owners.forEach(o=>{
    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        DIAMETERS.forEach(d=>state[o.id][s][l][d]=0);
        histories[o.id][s][l]=[];
      });
    });
    customSpecies.forEach(cs=>{
      if(state[o.id][cs.id]){
        LENGTHS.forEach(l=>{
          DIAMETERS.forEach(d=>state[o.id][cs.id][l][d]=0);
          histories[o.id][cs.id][l]=[];
        });
      }
    });
  });
  // ローカルストレージを全消去
  localStorage.removeItem('logcounter_data');
  localStorage.removeItem('logcounter_records');
  // 画面を再構築
  recentHistory=[];
  owners.forEach(o=>{
    SPECIES.forEach(s=>{
      LENGTHS.forEach(l=>{
        buildGrid(o.id,s,l);
        updateSummary(o.id,s,l);
        const bar=document.getElementById(`recent-bar-${o.id}-${s}-${l}`);
        if(bar)bar.innerHTML='';
      });
    });
  });
  speak('全て削除しました');
}

function deleteHistory(oid,s,l,i){histories[oid][s][l].splice(i,1);}

function renderHistory(oid,s,l){
  // 保存履歴表示は廃止（記録一覧に統合）
}

function switchSpecies(oid,s){
  ownerSpecies[oid]=s;
  document.getElementById(`sp-btn-${oid}-sugi`).className='species-tab'+(s==='sugi'?' sel-sugi':'');
  document.getElementById(`sp-btn-${oid}-hinoki`).className='species-tab'+(s==='hinoki'?' sel-hinoki':'');
  const totalBtn=document.getElementById(`sp-btn-${oid}-total`);
  if(totalBtn) totalBtn.className='species-tab'+(s==='total'?' sel-total':'');
  const yomiaiBtn=document.getElementById(`sp-btn-${oid}-yomiai`);
  if(yomiaiBtn) yomiaiBtn.className='species-tab'+(s==='yomiai'?' sel-total':'');
  const otherBtn=document.getElementById(`sp-btn-${oid}-other`);
  if(otherBtn) otherBtn.className='species-tab'+(s==='other'?' sel-other':'');
  // カスタム樹種タブの色もリセット
  customSpecies.forEach(cs=>{
    const b=document.getElementById(`sp-btn-${oid}-${cs.id}`);
    if(b)b.className='species-tab'+(cs.id===s?' sel-other':'');
  });
  document.querySelectorAll(`#owner-panel-${oid} .species-panel`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`sp-${oid}-${s}`).classList.add('active');
  if(s==='total'){refreshTotal(oid);speak('合計');return;}
  if(s==='yomiai'){buildYomiaiPanel(oid);speak('読み上げ');return;}
  if(s==='other'){buildOtherSpeciesPanel(oid);speak(getOtherName(oid));return;}
  // カスタム樹種
  const cs=customSpecies.find(c=>c.id===s);
  if(cs){
    document.querySelectorAll(`#owner-panel-${oid} .species-panel`).forEach(p=>p.classList.remove('active'));
    const panel=document.getElementById(`sp-${oid}-${s}`);
    if(panel)panel.classList.add('active');
    speak(cs.name);return;
  }
  speak(SNAME[s]);
}

function switchLen(oid,s,l){
  ownerLen[oid][s]=l;
  const sc=s==='sugi'?'sel-sugi':s==='hinoki'?'sel-hinoki':s==='other'?'sel-other':'sel-total';
  LENGTHS.forEach(len=>{const btn=document.getElementById(`ltab-${oid}-${s}-${len}`);if(btn)btn.className='len-tab'+(len===l?' '+sc:'');});
  document.querySelectorAll(`#panels-${oid}-${s} .lc-panel`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${oid}-${s}-${l}`).classList.add('active');
  speak(l+'メートル');
}

function getHeader(){
  const d=document.getElementById('hdr-date').value;
  const site=document.getElementById('hdr-site').value.trim();
  const dest=document.getElementById('hdr-dest').value.trim();
  return{date:d?new Date(d).toLocaleDateString('ja-JP'):'',site,dest};
}

// テキスト共有（Web Share API）
function shareText(oid,s,l){
  const text=getTextContent(oid,s,l);
  if(navigator.share){
    navigator.share({title:'ログカウンター集計',text:text})
    .catch(e=>{ navigator.clipboard.writeText(text).then(()=>alert('クリップボードにコピーしました'));});
  }else{
    navigator.clipboard.writeText(text).then(()=>alert('テキストをコピーしました'));
  }
}

// CSV共有（Web Share API）
function shareCSV(oid,s,l){
  const csv=getCSVContent(oid,s,l);
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  const filename=`ログカウンター_${sname}_${l}m.csv`;
  const blob=new Blob([csv],{type:'text/csv'});
  const file=new File([blob],filename,{type:'text/csv'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'ログカウンター集計'})
    .catch(e=>{navigator.clipboard.writeText(csv).then(()=>alert('CSVをコピーしました'));});
  }else{
    // フォールバック：クリップボードにコピー
    navigator.clipboard.writeText(csv).then(()=>alert('CSVをコピーしました'));
  }
}

// CSVファイルとしてダウンロード保存
function downloadCSV(oid,s,l){
  const csv=getCSVContent(oid,s,l);
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  const {date}=getHeader();
  const filename=`ログカウンター_${date||'集計'}_${sname}_${l}m.csv`;
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// テキスト内容を生成
function getTextContent(oid,s,l){
  const{date,site,dest}=getHeader();
  const owner=owners.find(o=>o.id===oid);
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  const lines=[];
  if(date)lines.push('日付: '+date);
  if(site)lines.push('現場名: '+site);
  if(dest)lines.push('納入先: '+dest);
  if(owner)lines.push('山主名: '+owner.name);
  lines.push('樹種: '+sname+'  長さ: '+l+'m','---');
  let tc=0,tv=0;
  DIAMETERS.forEach(d=>{if(state[oid][s][l][d]>0){const v=calcVol(d,l)*state[oid][s][l][d];lines.push(d+'cm: '+state[oid][s][l][d]+'ホン  '+v.toFixed(3)+'m3');tc+=state[oid][s][l][d];tv+=v;}});
  lines.push('---','合計: '+tc+'本  '+tv.toFixed(3)+'m3');
  return lines.join('\n');
}

// CSV内容を生成
function getCSVContent(oid,s,l){
  const{date,site,dest}=getHeader();
  const owner=owners.find(o=>o.id===oid);
  const sname=SNAME[s]||(customSpecies.find(c=>c.id===s)||{}).name||s;
  const rows=[];
  if(date)rows.push('日付,'+date);
  if(site)rows.push('現場名,'+site);
  if(dest)rows.push('納入先,'+dest);
  if(owner)rows.push('山主名,'+owner.name);
  rows.push('樹種,'+sname,'長さ,'+l+'m','径級(cm),本数,材積(m3)');
  let tc=0,tv=0;
  DIAMETERS.forEach(d=>{if(state[oid][s][l][d]>0){const v=calcVol(d,l)*state[oid][s][l][d];rows.push(d+','+state[oid][s][l][d]+','+v.toFixed(3));tc+=state[oid][s][l][d];tv+=v;}});
  rows.push('合計,'+tc+','+tv.toFixed(3));
  return rows.join('\n');
}

function copyCSV(oid,s,l){
  const{date,site,dest}=getHeader();const owner=owners.find(o=>o.id===oid);const rows=[];
  if(date)rows.push(`日付,${date}`);if(site)rows.push(`現場名,${site}`);if(dest)rows.push(`納入先,${dest}`);if(owner)rows.push(`山主名,${owner.name}`);

}
